<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Inventario - Camisas Deportivas</title>
    <style>
      /* DISEÑO ADAPTADO PARA PANTALLAS TÁCTILES */
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f8f9fa;
        color: #212529;
        margin: 0;
        padding: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        background-color: #ffffff;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 16px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 16px;
      }
      h1 { font-size: 1.4rem; margin-top: 0; margin-bottom: 15px; border-bottom: 2px solid #343a40; padding-bottom: 8px; text-align: center; }
      h2 { font-size: 1.1rem; margin-top: 0; margin-bottom: 12px; color: #495057; }
      .form-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 10px; }
      .form-group input, .form-group select, button {
        padding: 12px; font-size: 16px !important; border: 1px solid #ced4da; border-radius: 6px; width: 100%; outline: none;
      }
      .form-group input:focus, .form-group select:focus { border-color: #86b7fe; box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25); }
      button { background-color: #212529; color: #fff; border: none; font-weight: bold; cursor: pointer; transition: background-color 0.2s; min-height: 46px; }
      button:active { background-color: #555; }
      button:disabled { background-color: #ced4da; color: #6c757d; cursor: not-allowed; }
      button.btn-vender { background-color: #0d6efd; padding: 8px 12px; width: auto; min-height: 38px; }
      button.btn-eliminar { background-color: #dc3545; padding: 8px 12px; width: auto; min-height: 38px; }
      button.btn-limpiar { background-color: #6c757d; margin-top: 10px; }
      .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #dee2e6; border-radius: 6px; margin-top: 8px; }
      table { width: 100%; border-collapse: collapse; min-width: 400px; font-size: 14px; }
      th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #dee2e6; vertical-align: middle; }
      th { background-color: #f1f3f5; font-weight: 600; }
      .fila-grupo { background-color: #f8f9fa; font-weight: bold; cursor: pointer; }
      .icono-toggle { float: right; color: #6c757d; }
      .celda-vacia { color: #adb5bd; text-align: center; width: 20px; padding-right: 0; }
      .etiqueta-ubicacion { font-size: 0.8rem; background-color: #e9ecef; padding: 4px 6px; border-radius: 4px; color: #495057; font-weight: 500; }
      .acciones { display: flex; gap: 6px; }
      .sin-stock { color: #adb5bd; font-style: italic; }
      .modal-overlay { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(3px); justify-content: center; align-items: center; padding: 20px; }
      .modal-content { background-color: #fff; padding: 20px; border-radius: 8px; width: 100%; max-width: 360px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; animation: abrirModal 0.2s ease-out; }
      @keyframes abrirModal { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      .close-btn { position: absolute; top: 12px; right: 16px; color: #adb5bd; font-size: 28px; cursor: pointer; }
      .fecha-venta { font-size: 0.8rem; color: #6c757d; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Stock por Ubicación / Persona</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Lugar / Persona</th>
              <th>Total Camisas</th>
            </tr>
          </thead>
          <tbody id="tabla-resumen-ubicaciones"></tbody>
        </table>
      </div>
    </div>

    <div class="container">
      <h1>Inventario de Camisas</h1>

      <h2>Agregar Producto</h2>
      <form id="formulario-inventario" class="form-group">
        <input type="text" id="equipo" placeholder="Equipo / Modelo (Ej: Real Madrid)" required />
        <select id="talla" required>
          <option value="" disabled selected>Selecciona Talla</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
        </select>
        <input type="text" id="ubicacion" placeholder="¿Dónde está? (Ej: Casa Carlos)" required />
        <input type="number" id="cantidad" placeholder="Cantidad de camisas" min="1" required />
        <input type="number" id="precio" placeholder="Precio de venta ($)" step="0.01" min="0" required />
        <button type="submit" id="btn-guardar">Guardar en Inventario</button>
      </form>

      <h2>Listado de Stock</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Modelo</th>
              <th>Talla</th>
              <th>Lugar</th>
              <th>Stock</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-inventario"></tbody>
        </table>
      </div>
    </div>

    <div class="container">
      <h2>Historial de Ventas</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Modelo (Lugar)</th>
              <th>Talla</th>
              <th>Cant.</th>
            </tr>
          </thead>
          <tbody id="tabla-historial"></tbody>
        </table>
      </div>
      <button class="btn-limpiar" onclick="limpiarHistorial()">Borrar Historial</button>
    </div>

    <div id="modal-venta" class="modal-overlay">
      <div class="modal-content">
        <span class="close-btn" onclick="cerrarModal()">×</span>
        <h3>Registrar Venta</h3>
        <p id="info-producto-venta" style="font-weight: bold; margin-bottom: 4px; color:#212529;"></p>
        <p id="info-stock-venta" style="margin-top: 0; font-size: 0.9rem; color: #6c757d; margin-bottom: 15px;"></p>

        <div class="form-group">
          <label for="cantidad-vender" style="font-weight: 500; font-size: 14px;">Cantidad vendida:</label>
          <input type="number" id="cantidad-vender" min="1" value="1" />
          <button onclick="confirmarVenta()" id="btn-confirmar-venta" style="background-color: #0d6efd;">Confirmar Venta</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
      import { 
        getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy 
      } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

      // ⚠️ REEMPLAZA ESTOS DATOS CON LOS DE TU CONSOLA DE FIREBASE
      const firebaseConfig = {
    apiKey: "AIzaSyBgFUEi1SwD620PqESu2khrjpXL90hknk0",
    authDomain: "inventario-e7fcb.firebaseapp.com",
    projectId: "inventario-e7fcb",
    storageBucket: "inventario-e7fcb.firebasestorage.app",
    messagingSenderId: "835758443112",
    appId: "1:835758443112:web:d1120943def2344f5989dd"
  };

      // Inicializar Firebase y Firestore
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // Estado local de la app (se sincroniza automáticamente con la nube)
      let inventario = [];
      let historialVentas = [];
      let idProductoEnVenta = null;
      const estadoPestanas = {};

      // Elementos del DOM
      const formulario = document.getElementById("formulario-inventario");
      const tablaInventario = document.getElementById("tabla-inventario");
      const tablaHistorial = document.getElementById("tabla-historial");
      const tablaResumen = document.getElementById("tabla-resumen-ubicaciones");
      const modalVenta = document.getElementById("modal-venta");

      // --- ESCUCHADORES EN TIEMPO REAL (Firebase -> UI) ---
      
      // Sincronizar Inventario
      onSnapshot(collection(db, "inventario"), (snapshot) => {
        inventario = [];
        snapshot.forEach((doc) => {
          inventario.push({ id: doc.id, ...doc.data() });
        });
        actualizarResumenUbicaciones();
        actualizarTablaInventario();
      });

      // Sincronizar Historial (Ordenado por fecha más reciente)
      const qHistorial = query(collection(db, "historial"), orderBy("timestamp", "desc"));
      onSnapshot(qHistorial, (snapshot) => {
        historialVentas = [];
        snapshot.forEach((doc) => {
          historialVentas.push({ id: doc.id, ...doc.data() });
        });
        actualizarTablaHistorial();
      });

      // --- FUNCIONES DE RENDERIZADO DE INTERFAZ ---

      function actualizarResumenUbicaciones() {
        const conteo = inventario.reduce((acc, item) => {
          const ubi = item.ubicacion || "No asignada";
          acc[ubi] = (acc[ubi] || 0) + item.cantidad;
          return acc;
        }, {});
        const ubicaciones = Object.entries(conteo);
        if (ubicaciones.length === 0) {
          tablaResumen.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#adb5bd;">Sin productos</td></tr>';
          return;
        }
        tablaResumen.innerHTML = ubicaciones.map(([ubi, total]) => `<tr><td><strong>${ubi}</strong></td><td>${total} uds</td></tr>`).join("");
      }

      function togglePestana(claveGrupo) {
        estadoPestanas[claveGrupo] = !estadoPestanas[claveGrupo];
        actualizarTablaInventario();
      }

      function actualizarTablaInventario() {
        if (inventario.length === 0) {
          tablaInventario.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#6c757d;">Inventario vacío.</td></tr>';
          return;
        }
        const inventarioAgrupado = inventario.reduce((acc, item) => {
          const clave = item.equipo.toUpperCase().trim();
          if (!acc[clave]) acc[clave] = { nombreMostrar: item.equipo, items: [] };
          acc[clave].items.push(item);
          return acc;
        }, {});

        tablaInventario.innerHTML = Object.entries(inventarioAgrupado).map(([clave, grupo]) => {
          estadoPestanas[clave] = estadoPestanas[clave] ?? true;
          const estaAbierta = estadoPestanas[clave];
          const claveEscapada = clave.replace(/'/g, "\\'");

          let html = `<tr class="fila-grupo" onclick="togglePestana('${claveEscapada}')">
            <td colspan="6">${grupo.nombreMostrar} <span class="icono-toggle">${estaAbierta ? "▼" : "▶"}</span></td>
          </tr>`;

          if (estaAbierta) {
            html += grupo.items.map((item) => `
              <tr>
                <td class="celda-vacia">↳</td>
                <td><strong>${item.talla}</strong></td>
                <td><span class="etiqueta-ubicacion">${item.ubicacion}</span></td>
                <td class="${item.cantidad === 0 ? "sin-stock" : ""}"><strong>${item.cantidad}</strong></td>
                <td>$${item.precio}</td>
                <td class="acciones">
                  <button class="btn-vender" onclick="abrirModalVenta('${item.id}')" ${item.cantidad === 0 ? "disabled" : ""}>$</button>
                  <button class="btn-eliminar" onclick="eliminarArticulo('${item.id}')">✕</button>
                </td>
              </tr>
            `).join("");
          }
          return html;
        }).join("");
      }

 function actualizarTablaHistorial() {
  if (historialVentas.length === 0) {
    tablaHistorial.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#6c757d;">Ninguna venta grabada.</td></tr>';
    return;
  }
  
  tablaHistorial.innerHTML = historialVentas.map((venta) => {
    // 🛡️ Escudo: Si por alguna razón 'fecha' no existe, evita que la app se rompa
    const fechaTexto = venta.fecha || "00/00/0000 00:00";
    const partesFecha = fechaTexto.split(" ");
    const fechaDia = partesFecha[0] || "S/F";
    const fechaHora = partesFecha[1] || "";

    return `
      <tr>
        <td class="fecha-venta">${fechaDia}<br><small>${fechaHora}</small></td>
        <td>${venta.equipo || "Modelo"} <br><small style="color:#6c757d;">(${venta.ubicacion || "Sin lugar"})</small></td>
        <td>${venta.talla || "-"}</td>
        <td><strong>${venta.cantidadVendida || 0}</strong></td>
      </tr>
    `;
  }).join("");
}


      // --- ACCIONES ESCRITURA EN FIREBASE (CRUD) ---

      // Agregar nuevo producto a Firestore
      formulario.addEventListener("submit", async (e) => {
        e.preventDefault();
        const equipo = document.getElementById("equipo").value.trim();
        const talla = document.getElementById("talla").value;
        const ubicacion = document.getElementById("ubicacion").value.trim();
        const cantidad = parseInt(document.getElementById("cantidad").value, 10);
        const precio = parseFloat(document.getElementById("precio").value);

        try {
          await addDoc(collection(db, "inventario"), {
            equipo, talla, ubicacion, cantidad, precio
          });

          // Limpiar inputs
          document.getElementById("cantidad").value = "";
          document.getElementById("precio").value = "";
          document.getElementById("equipo").focus();
        } catch (error) {
          console.error("Error al agregar producto: ", error);
        }
      });

      // Eliminar de Firestore
      async function eliminarArticulo(id) {
        if (confirm("¿Borrar este registro permanentemente de la nube?")) {
          try {
            await deleteDoc(doc(db, "inventario", id));
          } catch (error) {
            console.error("Error al eliminar: ", error);
          }
        }
      }

      // Confirmar venta (Resta del stock y añade al historial)
      async function confirmarVenta() {
        const cant = parseInt(document.getElementById("cantidad-vender").value, 10);
        const producto = inventario.find((item) => item.id === idProductoEnVenta);

        if (producto && cant > 0 && cant <= producto.cantidad) {
          try {
            // 1. Actualizar el stock del producto
            const productoRef = doc(db, "inventario", idProductoEnVenta);
            await updateDoc(productoRef, {
              cantidad: producto.cantidad - cant
            });

            // 2. Crear el reporte en la colección "historial"
            const f = new Date();
            await addDoc(collection(db, "historial"), {
              equipo: producto.equipo,
              talla: producto.talla,
              ubicacion: producto.ubicacion,
              cantidadVendida: cant,
              fecha: `${f.toLocaleDateString()} ${f.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`,
              timestamp: Date.now() // Sirve para ordenar cronológicamente
            });

            cerrarModal();
          } catch (error) {
            console.error("Error al procesar la venta: ", error);
          }
        } else { 
          alert("Cantidad inválida."); 
        }
      }

      // Limpiar historial completo en bucle
      async function limpiarHistorial() {
        if (confirm("¿Borrar TODO el historial de ventas de la base de datos?")) {
          try {
            for (const venta of historialVentas) {
              await deleteDoc(doc(db, "historial", venta.id));
            }
          } catch (error) {
            console.error("Error al limpiar historial: ", error);
          }
        }
      }

      // --- CONTROL DEL MODAL DE VENTAS ---

      function abrirModalVenta(id) {
        const producto = inventario.find((item) => item.id === id);
        if (!producto) return;
        idProductoEnVenta = id;
        document.getElementById("info-producto-venta").innerText = `${producto.equipo} (Talla ${producto.talla})`;
        document.getElementById("info-stock-venta").innerText = `Disponibles: ${producto.cantidad} unidades en ${producto.ubicacion}`;
        const inputC = document.getElementById("cantidad-vender");
        inputC.value = 1;
        inputC.max = producto.cantidad;
        modalVenta.style.display = "flex";
      }

      function cerrarModal() { 
        modalVenta.style.display = "none"; 
        idProductoEnVenta = null; 
      }

      // Vincular funciones al objeto global 'window' para que sigan funcionando los onclick del HTML
      window.togglePestana = togglePestana;
      window.abrirModalVenta = abrirModalVenta;
      window.eliminarArticulo = eliminarArticulo;
      window.cerrarModal = cerrarModal;
      window.confirmarVenta = confirmarVenta;
      window.limpiarHistorial = limpiarHistorial;
    </script>
  </body>
</html>
