<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Inventario - Camisas Deportivas</title>
    <style>
      /* DISEÑO ADAPTADO PARA PANTALLAS TÁCTILES (MOBILE-FIRST) */
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f8f9fa;
        color: #212529;
        margin: 0;
        padding: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .container {
        background-color: #ffffff;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 16px;
        width: 100%;
        max-width: 500px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 16px;
      }
      h1 {
        font-size: 1.4rem;
        margin-top: 0;
        margin-bottom: 15px;
        border-bottom: 2px solid #343a40;
        padding-bottom: 8px;
        text-align: center;
      }
      h2 {
        font-size: 1.1rem;
        margin-top: 0;
        margin-bottom: 12px;
        color: #495057;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 10px;
      }
      .form-group input, .form-group select, button {
        padding: 12px;
        font-size: 16px !important;
        border: 1px solid #ced4da;
        border-radius: 6px;
        width: 100%;
        outline: none;
      }
      .form-group input:focus, .form-group select:focus {
        border-color: #86b7fe;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
      }
      button {
        background-color: #212529;
        color: #fff;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
        min-height: 46px;
      }
      button:active {
        background-color: #555;
      }
      button:disabled {
        background-color: #ced4da;
        color: #6c757d;
        cursor: not-allowed;
      }
      button.btn-vender { background-color: #0d6efd; padding: 8px 12px; width: auto; min-height: 38px; }
      button.btn-eliminar { background-color: #dc3545; padding: 8px 12px; width: auto; min-height: 38px; }
      button.btn-limpiar { background-color: #6c757d; margin-top: 10px; }

      .table-responsive {
        width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        border: 1px solid #dee2e6;
        border-radius: 6px;
        margin-top: 8px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 400px;
        font-size: 14px;
      }
      th, td {
        padding: 12px 10px;
        text-align: left;
        border-bottom: 1px solid #dee2e6;
        vertical-align: middle;
      }
      th {
        background-color: #f1f3f5;
        font-weight: 600;
      }
      .fila-grupo {
        background-color: #f8f9fa;
        font-weight: bold;
        cursor: pointer;
      }
      .icono-toggle { float: right; color: #6c757d; }
      .celda-vacia { color: #adb5bd; text-align: center; width: 20px; padding-right: 0; }
      .etiqueta-ubicacion { font-size: 0.8rem; background-color: #e9ecef; padding: 4px 6px; border-radius: 4px; color: #495057; font-weight: 500; }
      .acciones { display: flex; gap: 6px; }
      .sin-stock { color: #adb5bd; font-style: italic; }
      
      .modal-overlay {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(3px);
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .modal-content {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        position: relative;
        animation: abrirModal 0.2s ease-out;
      }
      @keyframes abrirModal {
        from { transform: scale(0.9); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      .close-btn { position: absolute; top: 12px; right: 16px; color: #adb5bd; font-size: 28px; cursor: pointer; }
      #loader { text-align: center; color: #6c757d; font-size: 14px; font-style: italic; margin-bottom: 10px; }
      .fecha-venta { font-size: 0.8rem; color: #6c757d; }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Stock por Ubicación / Persona</h2>
      <div id="loader">Cargando base de datos en tiempo real...</div>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Lugar / Persona</th>
              <th>Total Camisas</th>
            </tr>
          </thead>
          <tbody id="tabla-resumen-ubicaciones"></tbody>
        </table>
      </div>
    </div>

    <div class="container">
      <h1>Inventario de Camisas</h1>

      <h2>Agregar Producto</h2>
      <form id="formulario-inventario" class="form-group">
        <input type="text" id="equipo" placeholder="Equipo / Modelo (Ej: Real Madrid)" required />
        <select id="talla" required>
          <option value="" disabled selected>Selecciona Talla</option>
          <option value="S">S</option>
          <option value="M">M</option>
          <option value="L">L</option>
          <option value="XL">XL</option>
        </select>
        <input type="text" id="ubicacion" placeholder="¿Dónde está? (Ej: Casa Carlos)" required />
        <input type="number" id="cantidad" placeholder="Cantidad de camisas" min="1" required />
        <input type="number" id="precio" placeholder="Precio de venta ($)" step="0.01" min="0" required />
        <button type="submit" id="btn-guardar">Guardar en Inventario</button>
      </form>

      <h2>Listado de Stock</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Modelo</th>
              <th>Talla</th>
              <th>Lugar</th>
              <th>Stock</th>
              <th>Precio</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-inventario"></tbody>
        </table>
      </div>
    </div>

    <div class="container">
      <h2>Historial de Ventas</h2>
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Modelo (Lugar)</th>
              <th>Talla</th>
              <th>Cant.</th>
            </tr>
          </thead>
          <tbody id="tabla-historial"></tbody>
        </table>
      </div>
      <button class="btn-limpiar" onclick="limpiarHistorial()">Borrar Historial</button>
    </div>

    <div id="modal-venta" class="modal-overlay">
      <div class="modal-content">
        <span class="close-btn" onclick="cerrarModal()">×</span>
        <h3>Registrar Venta</h3>
        <p id="info-producto-venta" style="font-weight: bold; margin-bottom: 4px; color:#212529;"></p>
        <p id="info-stock-venta" style="margin-top: 0; font-size: 0.9rem; color: #6c757d; margin-bottom: 15px;"></p>

        <div class="form-group">
          <label for="cantidad-vender" style="font-weight: 500; font-size: 14px;">Cantidad vendida:</label>
          <input type="number" id="cantidad-vender" min="1" value="1" />
          <button onclick="confirmarVenta()" id="btn-confirmar-venta" style="background-color: #0d6efd;">Confirmar Venta</button>
        </div>
      </div>
    </div>

    <script type="module">
      // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyDRc92s7zKIxfPeL_iZGjLTLaezcH67RL4",
  authDomain: "inventario-2609e.firebaseapp.com",
  projectId: "inventario-2609e",
  storageBucket: "inventario-2609e.firebasestorage.app",
  messagingSenderId: "560309446377",
  appId: "1:560309446377:web:aa3cdc154965b62a7bf278"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

      let inventario = [];
      let historialVentas = [];
      let idProductoEnVenta = null;
      const estadoPestanas = {};

      const formulario = document.getElementById("formulario-inventario");
      const tablaInventario = document.getElementById("tabla-inventario");
      const tablaHistorial = document.getElementById("tabla-historial");
      const tablaResumen = document.getElementById("tabla-resumen-ubicaciones");
      const modalVenta = document.getElementById("modal-venta");
      const loader = document.getElementById("loader");

      onSnapshot(collection(db, "inventario"), (snapshot) => {
        inventario = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        actualizarResumenUbicaciones();
        actualizarTablaInventario();
        loader.style.display = "none";
      });

      const qHistorial = query(collection(db, "historial"), orderBy("timestamp", "desc"));
      onSnapshot(qHistorial, (snapshot) => {
        historialVentas = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        actualizarTablaHistorial();
      });

      const actualizarResumenUbicaciones = () => {
        const conteo = inventario.reduce((acc, item) => {
          const ubi = item.ubicacion || "No asignada";
          acc[ubi] = (acc[ubi] || 0) + item.cantidad;
          return acc;
        }, {});
        const ubicaciones = Object.entries(conteo);
        if (ubicaciones.length === 0) {
          tablaResumen.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#adb5bd;">Sin productos</td></tr>';
          return;
        }
        tablaResumen.innerHTML = ubicaciones.map(([ubi, total]) => `<tr><td><strong>${ubi}</strong></td><td>${total} uds</td></tr>`).join("");
      };

      const togglePestana = (claveGrupo) => {
        estadoPestanas[claveGrupo] = !estadoPestanas[claveGrupo];
        actualizarTablaInventario();
      };

      const actualizarTablaInventario = () => {
        if (inventario.length === 0) {
          tablaInventario.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#6c757d;">Inventario vacío.</td></tr>';
          return;
        }
        const inventarioAgrupado = inventario.reduce((acc, item) => {
          const clave = item.equipo.toUpperCase().trim();
          if (!acc[clave]) acc[clave] = { nombreMostrar: item.equipo, items: [] };
          acc[clave].items.push(item);
          return acc;
        }, {});

        tablaInventario.innerHTML = Object.entries(inventarioAgrupado).map(([clave, grupo]) => {
          estadoPestanas[clave] = estadoPestanas[clave] ?? true;
          const estaAbierta = estadoPestanas[clave];
          const claveEscapada = clave.replace(/'/g, "\\'");

          let html = `<tr class="fila-grupo" onclick="togglePestana('${claveEscapada}')">
            <td colspan="6">${grupo.nombreMostrar} <span class="icono-toggle">${estaAbierta ? "▼" : "▶"}</span></td>
          </tr>`;

          if (estaAbierta) {
            html += grupo.items.map((item) => `
              <tr>
                <td class="celda-vacia">↳</td>
                <td><strong>${item.talla}</strong></td>
                <td><span class="etiqueta-ubicacion">${item.ubicacion}</span></td>
                <td class="${item.cantidad === 0 ? "sin-stock" : ""}"><strong>${item.cantidad}</strong></td>
                <td>$${item.precio}</td>
                <td class="acciones">
                  <button class="btn-vender" onclick="abrirModalVenta('${item.id}')" ${item.cantidad === 0 ? "disabled" : ""}>$</button>
                  <button class="btn-eliminar" onclick="eliminarArticulo('${item.id}')">✕</button>
                </td>
              </tr>
            `).join("");
          }
          return html;
        }).join("");
      };

      const actualizarTablaHistorial = () => {
        if (historialVentas.length === 0) {
          tablaHistorial.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#6c757d;">Ninguna venta grabada.</td></tr>';
          return;
        }
        tablaHistorial.innerHTML = historialVentas.map((venta) => `
          <tr>
            <td class="fecha-venta">${venta.fecha.split(" ")[0]}<br><small>${venta.fecha.split(" ")[1] || ""}</small></td>
            <td>${venta.equipo} <br><small style="color:#6c757d;">(${venta.ubicacion})</small></td>
            <td>${venta.talla}</td>
            <td><strong>${venta.cantidadVendida}</strong></td>
          </tr>
        `).join("");
      };

      formulario.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btn-guardar");
        btn.disabled = true;
        btn.innerText = "Guardando...";

        const equipo = document.getElementById("equipo").value.trim();
        const talla = document.getElementById("talla").value;
        const ubicacion = document.getElementById("ubicacion").value.trim();
        const cantidad = parseInt(document.getElementById("cantidad").value, 10);
        const precio = parseFloat(document.getElementById("precio").value);

        try {
          await addDoc(collection(db, "inventario"), { equipo, talla, ubicacion, cantidad, precio });
          document.getElementById("cantidad").value = "";
          document.getElementById("precio").value = "";
        } catch (error) {
          alert("Error de conexión al guardar.");
        } finally {
          btn.disabled = false;
          btn.innerText = "Guardar en Inventario";
        }
      });

      const eliminarArticulo = async (id) => {
        if (confirm("¿Borrar este registro?")) {
          try { await deleteDoc(doc(db, "inventario", id)); } catch (e) { alert("Error al eliminar."); }
        }
      };

      const limpiarHistorial = async () => {
        if (confirm("¿Borrar TODO el historial de ventas permanentemente?")) {
          try {
            const querySnapshot = await getDocs(collection(db, "historial"));
            querySnapshot.forEach(async (d) => { await deleteDoc(doc(db, "historial", d.id)); });
          } catch (e) { alert("Error al vaciar."); }
        }
      };

      const abrirModalVenta = (id) => {
        const producto = inventario.find((item) => item.id === id); // CORREGIDO AQUÍ
        if (!producto) return;
        idProductoEnVenta = id;
        document.getElementById("info-producto-venta").innerText = `${producto.equipo} (Talla ${producto.talla})`;
        document.getElementById("info-stock-venta").innerText = `Disponibles: ${producto.cantidad} unidades en ${producto.ubicacion}`;
        const inputC = document.getElementById("cantidad-vender");
        inputC.value = 1;
        inputC.max = producto.cantidad;
        modalVenta.style.display = "flex";
      };

      const cerrarModal = () => { modalVenta.style.display = "none"; idProductoEnVenta = null; };

      const confirmarVenta = async () => {
        const cant = parseInt(document.getElementById("cantidad-vender").value, 10);
        const prod = inventario.find((item) => item.id === idProductoEnVenta);
        const btn = document.getElementById("btn-confirmar-venta");

        if (prod && cant > 0 && cant <= prod.cantidad) {
          btn.disabled = true;
          btn.innerText = "Procesando...";
          try {
            await updateDoc(doc(db, "inventario", idProductoEnVenta), { cantidad: prod.cantidad - cant });
            const f = new Date();
            await addDoc(collection(db, "historial"), {
              equipo: prod.equipo, talla: prod.talla, ubicacion: prod.ubicacion, cantidadVendida: cant,
              fecha: `${f.toLocaleDateString()} ${f.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`,
              timestamp: f.getTime()
            });
            cerrarModal();
          } catch (e) { alert("Error en el proceso."); } finally { btn.disabled = false; btn.innerText = "Confirmar Venta"; }
        } else { alert("Cantidad inválida."); }
      };

      window.togglePestana = togglePestana;
      window.eliminarArticulo = eliminarArticulo;
      window.limpiarHistorial = limpiarHistorial;
      window.abrirModalVenta = abrirModalVenta;
      window.cerrarModal = cerrarModal;
      window.confirmarVenta = confirmarVenta;
    </script>
  </body>
</html>
